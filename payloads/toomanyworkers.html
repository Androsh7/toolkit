<!doctype html>
<html>
  <body>
    <input id="numWorkers" type="number" value="4" />
    <input id="duty" type="number" value="200" />
    <div id="workerStats"></div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const numWorkersEl = document.getElementById("numWorkers");
        const dutyEl = document.getElementById("duty");
        const workerStats = document.getElementById("workerStats");

        const workerBlob = new Blob(
          [
            `
          let running = false;
          let timer = null;
          function burst(ms){
            const end = performance.now() + ms;
            let x = 0;
            while (performance.now() < end) x += Math.sqrt(Math.random()) % 1;
            postMessage({ok:true, x});
          }
          onmessage = (e) => {
            const {cmd, ms} = e.data || {};
            if (cmd === 'start' && !running) {
              running = true;
              const loop = () => {
                if (!running) return;
                burst(ms);
                timer = setTimeout(loop, Math.max(0, 1000 - ms));
              };
              loop();
            } else if (cmd === 'stop') {
              running = false;
              if (timer) clearTimeout(timer), timer = null;
              close();
            }
          };
        `,
          ],
          { type: "text/javascript" },
        );

        const url = URL.createObjectURL(workerBlob);

        const n = Math.min(64, Math.max(1, +numWorkersEl.value));
        const ms = Math.max(0, +dutyEl.value || 0);

        const workers = Array.from({ length: n }, () => new Worker(url));
        for (const w of workers) w.postMessage({ cmd: "start", ms });

        workerStats.textContent = `Running ${n} worker(s) at ~${ms} ms/sec each…`;
      });
    </script>
  </body>
</html>
